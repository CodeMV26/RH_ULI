<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RH_ULI Stock System v1.3.4</title>
    <style>
        :root { --primary: #2563eb; --warning: #ea580c; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; box-sizing: border-box; }
        
        /* Barra di Navigazione */
        .nav-tabs { display: flex; gap: 6px; margin-bottom: 12px; position: sticky; top: 0; background: var(--bg); padding: 4px 0; z-index: 100; }
        .nav-btn { flex: 1; background: #475569 !important; color: white !important; border: none; padding: 12px 6px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; -webkit-appearance: none; }
        
        /* Stati Attivi */
        .nav-btn.active-orders { background: #2563eb !important; }
        .nav-btn.active-print { background: #ea580c !important; }
        .nav-btn.active-manage { background: #0f172a !important; }
        
        /* Pulsanti */
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 100%; display: block; text-align: center; box-sizing: border-box; margin-bottom: 8px; cursor: pointer; -webkit-appearance: none; }
        .btn-success { background: #16a34a; }
        .btn-secondary { background: #475569; }
        .btn-danger { background: #dc2626; padding: 6px 10px; font-size: 12px; width: auto; display: inline-block; }
        .btn-edit { background: #ea580c; padding: 6px 10px; font-size: 12px; width: auto; display: inline-block; }
        
        /* Ricerca e Suggerimenti Rapidi */
        .search-container { display: flex; gap: 8px; margin-bottom: 12px; position: relative; }
        .search-input { flex: 1; padding: 14px; border: 2px solid var(--primary); border-radius: 8px; font-size: 16px; box-sizing: border-box; background: white; margin: 0; }
        .btn-action { background: #2563eb; color: white; border: none; padding: 0 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; white-space: normal; line-height: 1.2; width: 110px; -webkit-appearance: none; }
        
        .suggestions-list { background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item:active { background: #eff6ff; color: #1e3a8a; font-weight: bold; }
        .suggestion-code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #475569; }
        
        /* Scheda Prodotto */
        .item-card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .item-header { font-size: 16px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #dbeafe; padding-bottom: 6px; margin-bottom: 12px; }
        
        /* Griglie Parametri */
        .section-title { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; margin: 10px 0 4px 0; letter-spacing: 0.5px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        
        .data-box { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; text-align: center; }
        .data-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        .data-val { font-size: 14px; font-weight: bold; color: #0f172a; }
        .data-box.highlight { background: #eff6ff; border-color: #bfdbfe; }
        .data-box.alert { background: #fffbeb; border-color: #fde68a; }
        .data-box.output { background: #f0fdf4; border-color: #bbf7d0; }
        
        /* Campi di Input */
        .input-box { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; text-align: center; font-weight: bold; background: #fff; }
        .input-confirm { border: 2px solid #16a34a; background: #f0fdf4; color: #16a34a; }
        
        /* Form Database */
        .db-form { background: white; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        /* Tabelle */
        .db-table-wrapper { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #cbd5e1; }
        .db-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .db-table th, .db-table td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .db-table th { background: #e2e8f0; font-weight: bold; }
        
        .page-panel { display: block; }
        .page-panel.hidden { display: none !important; }
        .text-center { text-align: center; }
        
        .version-footer { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 40px; margin-bottom: 15px; font-weight: bold; }

        @media print {
            body { background: white; color: black; padding: 0; }
            .nav-tabs, .search-container, .suggestions-list, .btn, .btn-danger, .btn-edit, #panel-orders, #panel-manage, .no-print { display: none !important; }
            #panel-print-list { display: block !important; }
            .db-table-wrapper { border: none; overflow: visible; }
            .db-table th { background: #f1f5f9 !important; color: black !important; border-bottom: 2px solid black; }
            .db-table td { border-bottom: 1px solid #cbd5e1; }
        }
    </style>
</head>
<body>

    <!-- NAVIGAZIONE PRINCIPALE -->
    <div class="nav-tabs">
        <button id="nav-orders" class="nav-btn active-orders" onclick="switchTab('orders')">📋 Compila Ordini</button>
        <button id="nav-print-list" class="nav-btn" onclick="switchTab('print-list')">🖨️ Lista Riordino</button>
        <button id="nav-manage" class="nav-btn" onclick="switchTab('manage')">🗄️ Database Archivio</button>
    </div>

    <!-- ================= PANNELLO ORDINI ================= -->
    <div id="panel-orders" class="page-panel">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" onkeyup="handleSearchInput()" placeholder="🔍 Scrivi per cercare (es: pane, 601...)">
            <button id="btn-save-next" class="btn-action" style="display:none;" onclick="saveAndClearCurrentCard()">➕ Salva e Passa al Prossimo</button>
        </div>
        <!-- LISTA SUGGERIMENTI SELEZIONABILI -->
        <div id="suggestions-box" class="suggestions-list" style="display:none;"></div>
        <!-- SCHEDA DELL'ITEM SELEZIONATO -->
        <div id="cards-container"></div>
    </div>

    <!-- ================= PANNELLO LISTA DI RIORDINO GIORNALIERA ================= -->
    <div id="panel-print-list" class="page-panel hidden">
        <div class="item-card">
            <h2 id="report-date-title" style="margin-top:0; color:#1e3a8a; font-size:18px;">📋 Riordino del --/--/--</h2>
            
            <div class="db-table-wrapper">
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Codice</th>
                            <th>Descrizione</th>
                            <th>Misure</th>
                            <th>Tot Casa</th>
                            <th>In Arrivo</th>
                            <th>Vendite</th>
                            <th>Ordine Conf.</th>
                        </tr>
                    </thead>
                    <tbody id="print-table-body"></tbody>
                </table>
            </div>

            <div style="margin-top:15px; display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;" class="no-print">
                <button class="btn btn-success" style="margin-bottom:0;" onclick="sendOrderWhatsApp()">📱 Invia via WhatsApp</button>
                <button class="btn" style="margin-bottom:0;" onclick="window.print()">🖨️ Stampa PDF</button>
                <button class="btn btn-secondary" style="margin-bottom:0;" onclick="sendReportEmail()">✉️ Invia via Mail</button>
            </div>
            <button class="btn btn-danger no-print" style="margin-top:15px; width:100%; padding:10px; font-size:12px;" onclick="clearCurrentOrderList()">🗑️ Svuota Intera Lista Giornaliera</button>
        </div>
    </div>

    <!-- ================= PANNELLO DATABASE ARCHIVIO ================= -->
    <div id="panel-manage" class="page-panel hidden">
        <div class="db-form">
            <h3 id="form-title" style="margin-top:0; color:#1e3a8a;">➕ Inserisci Nuovo Item</h3>
            <input type="hidden" id="edit-index" value="">
            <div class="grid-2">
                <div class="form-group"><label>Codice Item</label><input type="text" id="f-code" class="form-input"></div>
                <div class="form-group"><label>Descrizione / Nome</label><input type="text" id="f-name" class="form-input"></div>
            </div>
            <div class="grid-3">
                <div class="form-group"><label>Peso (g)</label><input type="number" id="f-weight" class="form-input"></div>
                <div class="form-group"><label>Pz x Conf</label><input type="number" id="f-pcs-conf" class="form-input"></div>
                <div class="form-group"><label>Conf x Cartone</label><input type="number" id="f-conf-cart" class="form-input"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="margin-bottom:0;" onclick="saveDatabaseRecord()">💾 Salva nel Database</button>
                <button class="nav-btn" id="btn-db-cancel" style="display:none;" onclick="resetForm()">Annulla</button>
            </div>
        </div>

        <div class="item-card">
            <h4>🗃️ Elenco Prodotti Salvati (<span id="db-count">0</span>)</h4>
            <div class="db-table-wrapper">
                <table class="db-table">
                    <thead><tr><th>Codice</th><th>Descrizione</th><th>Misure</th><th class="text-center">Azioni</th></tr></thead>
                    <tbody id="db-table-body"></tbody>
                </table>
            </div>
        </div>
        <button class="btn" style="background:#64748b; margin-top:20px; font-size:12px; padding:8px;" onclick="emergencyReset()">🔄 Reset di Emergenza Memoria App</button>
    </div>

    <div class="version-footer no-print">RH_ULI Stock System - Versione 1.3.4</div>

    <script>
        let database = [];
        let orderSession = {}; 
        let currentFormState = {}; 
        let selectedItemCode = null; // Memorizza l'unico item selezionato via click

        function getFormattedDate() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yy = String(today.getFullYear()).slice(-2);
            return `${dd}/${mm}/${yy}`;
        }

        function switchTab(tab) {
            const pOrders = document.getElementById('panel-orders');
            const pPrint = document.getElementById('panel-print-list');
            const pManage = document.getElementById('panel-manage');
            
            const btnOrders = document.getElementById('nav-orders');
            const btnPrint = document.getElementById('nav-print-list');
            const btnManage = document.getElementById('nav-manage');

            pOrders.classList.add('hidden');
            pPrint.classList.add('hidden');
            pManage.classList.add('hidden');
            
            btnOrders.className = "nav-btn";
            btnPrint.className = "nav-btn";
            btnManage.className = "nav-btn";
            
            if (tab === 'orders') {
                pOrders.classList.remove('hidden');
                btnOrders.classList.add('active-orders');
                resetOrderPanel();
            } else if (tab === 'print-list') {
                pPrint.classList.remove('hidden');
                btnPrint.classList.add('active-print');
                renderPrintList();
            } else if (tab === 'manage') {
                pManage.classList.remove('hidden');
                btnManage.classList.add('active-manage');
                renderDatabaseTable();
            }
        }

        function resetOrderPanel() {
            selectedItemCode = null;
            document.getElementById('search-input').value = "";
            document.getElementById('suggestions-box').style.display = "none";
            document.getElementById('btn-save-next').style.display = "none";
            document.getElementById('cards-container').innerHTML = `<div class="data-box" style="padding:25px; color:#64748b; font-weight:bold;">🔍 Digita un Codice o una Descrizione per iniziare a compilare...</div>`;
        }

        function renderDatabaseTable() {
            const tbody = document.getElementById('db-table-body');
            document.getElementById('db-count').innerText = database.length;
            tbody.innerHTML = '';
            if(database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:15px;">Nessun record in archivio.</td></tr>`;
                return;
            }
            database.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td><strong>${item.code}</strong></td><td>${item.name}</td><td>${item.weight}g | C:${item.confCart}xP:${item.pcsConf}</td>
                    <td class="text-center">
                        <button class="btn-edit" onclick="editDatabaseRecord(${index})">✏️</button>
                        <button class="btn-danger" onclick="deleteDatabaseRecord(${index})">🗑️</button>
                    </td>`;
                tbody.appendChild(row);
            });
        }

        function saveDatabaseRecord() {
            const code = document.getElementById('f-code').value.trim();
            const name = document.getElementById('f-name').value.trim();
            const weight = parseInt(document.getElementById('f-weight').value) || 0;
            const pcsConf = parseInt(document.getElementById('f-pcs-conf').value) || 0;
            const confCart = parseInt(document.getElementById('f-conf-cart').value) || 0;
            const editIndex = document.getElementById('edit-index').value;

            if(!code || !name || weight <= 0 || pcsConf <= 0 || confCart <= 0) { alert("Compila tutto!"); return; }

            if(editIndex === "") {
                database.push({ code, name, weight, pcsConf, confCart });
            } else {
                const idx = parseInt(editIndex);
                database[idx] = { code, name, weight, pcsConf, confCart };
            }
            localStorage.setItem('rh_db_v1.3_anag', JSON.stringify(database));
            resetForm(); renderDatabaseTable(); alert("Salvato nel database di archivio!");
        }

        function editDatabaseRecord(index) {
            const item = database[index];
            document.getElementById('f-code').value = item.code;
            document.getElementById('f-name').value = item.name;
            document.getElementById('f-weight').value = item.weight;
            document.getElementById('f-pcs-conf').value = item.pcsConf;
            document.getElementById('f-conf-cart').value = item.confCart;
            document.getElementById('edit-index').value = index;
            document.getElementById('form-title').innerText = "✏️ Modifica Record";
            document.getElementById('btn-db-cancel').style.display = "inline-block";
        }

        function deleteDatabaseRecord(index) {
            if(confirm("Eliminare definitivamente questo prodotto?")) {
                database.splice(index, 1);
                localStorage.setItem('rh_db_v1.3_anag', JSON.stringify(database));
                renderDatabaseTable();
            }
        }

        function resetForm() {
            document.getElementById('f-code').value=""; document.getElementById('f-name').value=""; document.getElementById('f-weight').value="";
            document.getElementById('f-pcs-conf').value=""; document.getElementById('f-conf-cart').value=""; document.getElementById('edit-index').value="";
            document.getElementById('form-title').innerText = "➕ Inserisci Nuovo Item"; document.getElementById('btn-db-cancel').style.display = "none";
        }

        // NUOVA GESTIONE DELLA RICERCA AD ELENCO DI SUGGERIMENTI
        function handleSearchInput() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const suggestionsBox = document.getElementById('suggestions-box');
            const container = document.getElementById('cards-container');
            const actionBtn = document.getElementById('btn-save-next');

            // Se l'utente sta modificando il testo dopo aver già scelto un item, resetta la scelta
            if (selectedItemCode) {
                selectedItemCode = null;
                actionBtn.style.display = "none";
            }

            if (query === '') {
                suggestionsBox.style.display = "none";
                container.innerHTML = `<div class="data-box" style="padding:25px; color:#64748b; font-weight:bold;">🔍 Digita un Codice o una Descrizione per iniziare a compilare...</div>`;
                return;
            }

            const filtered = database.filter(item => item.name.toLowerCase().includes(query) || item.code.toLowerCase().includes(query));
            
            if(filtered.length === 0) {
                suggestionsBox.style.display = "none";
                container.innerHTML = `<div class="data-box" style="padding:20px;">Nessun prodotto in archivio corrispondente.</div>`;
                return;
            }

            // Mostra la lista dei suggerimenti filtrati
            suggestionsBox.innerHTML = '';
            suggestionsBox.style.display = "block";
            container.innerHTML = `<div class="data-box" style="padding:15px; color:#2563eb;">👆 Seleziona il prodotto desiderato dalla lista sopra per compilarlo.</div>`;

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<span>${item.name}</span> <span class="suggestion-code">COD. ${item.code}</span>`;
                div.onclick = function() {
                    selectItemForOrder(item.code);
                };
                suggestionsBox.appendChild(div);
            });
        }

        // ATTIVA LA SCHEDA DEL SINGOLO PRODOTTO SELEZIONATO DALL'UTENTE
        function selectItemForOrder(code) {
            selectedItemCode = code;
            document.getElementById('suggestions-box').style.display = "none";
            
            const item = database.find(i => i.code === code);
            if(item) {
                document.getElementById('search-input').value = item.name; // Inserisce il nome completo nella barra
                renderSingleOrderCard(item);
            }
        }

        function renderSingleOrderCard(item) {
            const container = document.getElementById('cards-container');
            const actionBtn = document.getElementById('btn-save-next');
            container.innerHTML = '';
            actionBtn.style.display = "block";

            if (!currentFormState[item.code]) {
                currentFormState[item.code] = { giacMagazzino: 0, giacCucina: 0, arriviCartoni: 0, venditeSettimana: 0, confermatoCartoni: 0 };
            }
            const state = currentFormState[item.code];

            const pezziPerCartone = item.pcsConf * item.confCart;
            const totaleInCasaPezzi = state.giacMagazzino + state.giacCucina;
            const arriviPezziTotali = state.arriviCartoni * pezziPerCartone;
            
            const propostaPezzi = Math.max(0, state.venditeSettimana - totaleInCasaPezzi - arriviPezziTotali);
            const propostaCartoni = pezziPerCartone > 0 ? (propostaPezzi / pezziPerCartone).toFixed(2) : 0;
            
            const pezziOrdinatiFinali = state.confermatoCartoni * pezziPerCartone;
            const kgOrdinatiFinali = ((pezziOrdinatiFinali * item.weight) / 1000).toFixed(2);

            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div class="item-header">📦 [COD. ${item.code}] - ${item.name}</div>
                <div class="grid-3">
                    <div class="data-box"><div class="data-label">Peso</div><div class="data-val">${item.weight}g</div></div>
                    <div class="data-box"><div class="data-label">Pz x Conf</div><div class="data-val">${item.pcsConf}</div></div>
                    <div class="data-box"><div class="data-label">Conf x Crt</div><div class="data-val">${item.confCart}</div></div>
                </div>

                <div class="section-title">1. Giacenza In Casa (Pezzi)</div>
                <div class="grid-3">
                    <div>
                        <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">MAGAZZINO</label>
                        <input type="number" class="input-box" value="${state.giacMagazzino}" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';" onchange="updateSingleValue('${item.code}', 'giacMagazzino', this.value)">
                    </div>
                    <div>
                        <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">CUCINA</label>
                        <input type="number" class="input-box" value="${state.giacCucina}" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';" onchange="updateSingleValue('${item.code}', 'giacCucina', this.value)">
                    </div>
                    <div class="data-box highlight"><div class="data-label">Totale Casa</div><div class="data-val">${totaleInCasaPezzi} pz</div></div>
                </div>

                <div class="section-title">2. In Arrivo & Vendite Recenti</div>
                <div class="grid-3">
                    <div>
                        <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">ARRIVI (CRT)</label>
                        <input type="number" class="input-box" value="${state.arriviCartoni}" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';" onchange="updateSingleValue('${item.code}', 'arriviCartoni', this.value)">
                    </div>
                    <div class="data-box"><div class="data-label">In Arrivo</div><div class="data-val">${arriviPezziTotali} pz</div></div>
                    <div>
                        <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">VENDITE (PZ)</label>
                        <input type="number" class="input-box" value="${state.venditeSettimana}" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';" onchange="updateSingleValue('${item.code}', 'venditeSettimana', this.value)">
                    </div>
                </div>

                <div class="section-title">3. Analisi e Proposta di Ordine</div>
                <div class="grid-2">
                    <div class="data-box alert"><div class="data-label">Proposta (Pezzi)</div><div class="data-val">${propostaPezzi} pz</div></div>
                    <div class="data-box alert"><div class="data-label">Proposta (Cartoni)</div><div class="data-val">${propostaCartoni} CRT</div></div>
                </div>

                <div class="section-title" style="color:#16a34a;">4. Confirm Quantità d'Ordine</div>
                <div class="grid-3">
                    <div>
                        <label style="font-size:9px; font-weight:bold; display:block; text-align:center; color:#16a34a;">CONF. CRT</label>
                        <input type="number" class="input-box input-confirm" value="${state.confermatoCartoni}" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';" onchange="updateSingleValue('${item.code}', 'confermatoCartoni', this.value)">
                    </div>
                    <div class="data-box output"><div class="data-label">Tot Pezzi</div><div class="data-val" style="color:#16a34a;">${pezziOrdinatiFinali}</div></div>
                    <div class="data-box output"><div class="data-label">Tot Kg</div><div class="data-val" style="color:#16a34a;">${kgOrdinatiFinali}</div></div>
                </div>
            `;
            container.appendChild(card);
        }

        function updateSingleValue(code, field, value) {
            if (currentFormState[code]) {
                currentFormState[code][field] = field.includes('Cartoni') || field.includes('confermato') ? (parseFloat(value) || 0) : (parseInt(value) || 0);
                const item = database.find(i => i.code === code);
                if(item) renderSingleOrderCard(item);
            }
        }

        function saveAndClearCurrentCard() {
            if (!selectedItemCode) return;
            
            const currentItem = database.find(item => item.code === selectedItemCode);
            
            if (currentItem) {
                const state = currentFormState[currentItem.code];
                
                if (!state || state.confermatoCartoni === 0) {
                    if (!confirm("⚠️ Non hai inserito nessuna quantità d'ordine (CONF. CRT è a 0).\nVuoi archiviare l'articolo comunque?")) {
                        return;
                    }
                }
                
                if (!orderSession[currentItem.code]) {
                    orderSession[currentItem.code] = { giacMagazzino: 0, giacCucina: 0, arriviCartoni: 0, venditeSettimana: 0, confermatoCartoni: 0 };
                }
                
                orderSession[currentItem.code].giacMagazzino += state.giacMagazzino;
                orderSession[currentItem.code].giacCucina += state.giacCucina;
                orderSession[currentItem.code].arriviCartoni += state.arriviCartoni;
                orderSession[currentItem.code].venditeSettimana += state.venditeSettimana;
                orderSession[currentItem.code].confermatoCartoni += state.confermatoCartoni;
                
                localStorage.setItem('rh_db_v1.3_session', JSON.stringify(orderSession));
                currentFormState[currentItem.code] = { giacMagazzino: 0, giacCucina: 0, arriviCartoni: 0, venditeSettimana: 0, confermatoCartoni: 0 };
                
                alert(`Articolo ${currentItem.code} aggiunto correttamente alla Lista Riordino!`);
            }
            
            resetOrderPanel();
        }

        function renderPrintList() {
            document.getElementById('report-date-title').innerText = `📋 Riordino del ${getFormattedDate()}`;
            const tbody = document.getElementById('print-table-body');
            tbody.innerHTML = '';

            const activeOrders = database.filter(item => orderSession[item.code] && orderSession[item.code].confermatoCartoni > 0);

            if (activeOrders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#64748b;">Nessun articolo inserito nella lista di riordino di oggi. Conferma delle quantità nel pannello Ordini.</td></tr>`;
                return;
            }

            activeOrders.forEach(item => {
                const session = orderSession[item.code];
                const totalCasa = session.giacMagazzino + session.giacCucina;
                const totalArrivi = session.arriviCartoni * (item.pcsConf * item.confCart);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.code}</strong></td>
                    <td>${item.name}</td>
                    <td>${item.weight}g (C:${item.confCart}xP:${item.pcsConf})</td>
                    <td>${totalCasa} pz</td>
                    <td>${totalArrivi} pz (${session.arriviCartoni} CRT)</td>
                    <td>${session.venditeSettimana} pz</td>
                    <td style="color:#16a34a; font-weight:bold;">${session.confermatoCartoni} CRT</td>
                `;
                tbody.appendChild(row);
            });
        }

        function sendOrderWhatsApp() {
            const activeOrders = database.filter(item => orderSession[item.code] && orderSession[item.code].confermatoCartoni > 0);
            if(activeOrders.length === 0) {
                alert("Nessun ordine presente nella lista giornaliera da inviare!");
                return;
            }
            
            let text = `📋 *RIORDINO DEL [${getFormattedDate()}]*\n`;
            text += `=========================\n\n`;
            let pesoTotaleSpedizione = 0;
            
            activeOrders.forEach(i => {
                const session = orderSession[i.code];
                const pezziPerCartone = i.pcsConf * i.confCart;
                const pezziOrdinatiFinali = session.confermatoCartoni * pezziPerCartone;
                const kgTot = (pezziOrdinatiFinali * i.weight) / 1000;
                pesoTotaleSpedizione += kgTot;
                
                text += `📦 *COD. ${i.code}*\n`;
                text += `${i.name}\n`;
                text += `• In Casa: ${session.giacMagazzino + session.giacCucina} pz\n`;
                text += `• Ordine: *${session.confermatoCartoni} CRT* (${kgTot.toFixed(2)} Kg)\n`;
                text += `-------------------------\n`;
            });
            
            text += `\n⚖️ *PESO TOTALE: ${pesoTotaleSpedizione.toFixed(2)} Kg*`;
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(text), '_blank');
        }

        function sendReportEmail() {
            const activeOrders = database.filter(item => orderSession[item.code] && orderSession[item.code].confermatoCartoni > 0);
            if(activeOrders.length === 0) { alert("Lista vuota!"); return; }

            let subject = `Riordino del ${getFormattedDate()}`;
            let body = `Riepilogo Ordine del ${getFormattedDate()}:\n\n`;
            
            activeOrders.forEach(item => {
                const s = orderSession[item.code];
                body += `Cod: ${item.code} | ${item.name} | Ordine: ${s.confermatoCartoni} CRT\n`;
            });

            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        function clearCurrentOrderList() {
            const primaConferma = confirm("❓ VUOI CANCELLARE LA LISTA DI OGGI?\n\nQuesta operazione azzera i cartoni ordinati oggi, ma conserva tutti i prodotti registrati nel tuo database.");
            if (primaConferma) {
                orderSession = {};
                currentFormState = {};
                localStorage.removeItem('rh_db_v1.3_session');
                renderPrintList();
                alert("🗑️ Lista di riordino giornaliera svuotata con successo!");
            }
        }

        function emergencyReset() {
            const confermaUno = confirm("⚠️ ATTENZIONE: RESET DI EMERGENZA GENERALE!\n\nSei sicuro di voler formattare l'applicazione? Cliccando su OK avvierai la procedura.");
            if (confermaUno) {
                const confermaDue = confirm("🚨 CONFERMA DEFINITIVA DI SICUREZZA 🚨\n\nATTENZIONE: Cliccando di nuovo su OK perderai TUTTI I PRODOTTI SALVATI NEL DATABASE (Nomi, Codici, Pesi). Questa operazione NON si può annullare.\n\nVuoi davvero procedere al reset totale?");
                if (confermaDue) {
                    localStorage.clear(); 
                    location.reload();
                }
            }
        }

        window.onload = function() {
            const savedAnag = localStorage.getItem('rh_db_v1.3_anag');
            if(savedAnag) database = JSON.parse(savedAnag);
            
            const savedSession = localStorage.getItem('rh_db_v1.3_session');
            if(savedSession) orderSession = JSON.parse(savedSession);
            
            resetOrderPanel();
        };
    </script>
</body>
</html>
