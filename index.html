<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RH_ULI Stock Expert</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; box-sizing: border-box; }
        
        /* Navigazione */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 12px; position: sticky; top: 0; background: var(--bg); padding: 4px 0; z-index: 10; }
        .nav-tabs .btn { flex: 1; margin-bottom: 0; }
        
        /* Pulsanti */
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 100%; display: block; text-align: center; box-sizing: border-box; margin-bottom: 8px; cursor: pointer; }
        .btn-secondary { background: #475569; }
        .btn-success { background: #16a34a; }
        .btn-danger { background: #dc2626; padding: 6px 10px; font-size: 13px; width: auto; display: inline-block; margin-bottom: 0; }
        .btn-edit { background: #ea580c; padding: 6px 10px; font-size: 13px; width: auto; display: inline-block; margin-bottom: 0; }
        
        /* Ricerca */
        .search-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        
        /* VISUALIZZAZIONE A SCHEDE (ITEM PER VOLTA) */
        .item-card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 14px; border: 1px solid var(--border); }
        .item-title { font-size: 18px; font-weight: 8px; color: #1e3a8a; border-bottom: 2px solid #eff6ff; padding-bottom: 6px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Griglia Parametri Chiara */
        .param-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .param-box { background: #f8fafc; padding: 8px 10px; border-radius: 6px; border: 1px solid #f1f5f9; }
        .param-box.highlight { background: #eff6ff; border-color: #bfdbfe; }
        .param-box.warning { background: #fffbeb; border-color: #fde68a; }
        .param-label { font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .param-value { font-size: 15px; font-weight: bold; }
        
        /* Input numerici nelle schede ordini */
        .input-field { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; text-align: center; font-weight: bold; background: white; }
        
        /* STRUTTURA DATABASE (Campi e Record distinti) */
        .db-form { background: white; padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #475569; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        /* Tabella di controllo Database */
        .db-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 14px; }
        .db-table th, .db-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
        .db-table th { background: #e2e8f0; font-weight: bold; }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="btn-tab-orders" class="btn" onclick="switchTab('orders')">📋 Pannello Ordini</button>
        <button id="btn-tab-manage" class="btn btn-secondary" onclick="switchTab('manage')">🗄️ Database Archivio</button>
    </div>

    <div id="tab-orders">
        <input type="text" id="search-input" class="search-input" oninput="renderOrdersCards()" placeholder="🔍 Cerca codice o nome item...">
        
        <div id="cards-container">
            </div>
        
        <button class="btn btn-success" style="margin-top: 10px; position: sticky; bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" onclick="sendOrder()">📱 Invia Ordine Confermato su WhatsApp</button>
    </div>

    <div id="tab-manage" class="hidden">
        <div class="db-form">
            <h3 id="form-title" style="margin-top:0; color:#1e3a8a;">➕ Inserisci Nuovo Record Item</h3>
            <input type="hidden" id="edit-index" value="">
            
            <div class="form-group">
                <label>CAMPO: Nome Prodotto / Codice Materiale</label>
                <input type="text" id="field-name" class="form-input" placeholder="Es. Bullone ULI-26">
            </div>
            
            <div class="form-group">
                <label>CAMPO: Livello Stock Ideale (Quantità Massima)</label>
                <input type="number" id="field-ideal" class="form-input" placeholder="Es. 100" min="1">
            </div>
            
            <div style="display:flex; gap:10px;">
                <button class="btn" id="btn-db-save" onclick="saveRecord()">💾 Salva nel Database</button>
                <button class="btn btn-secondary hidden" id="btn-db-cancel" onclick="clearForm()">Annulla</button>
            </div>
        </div>

        <div class="card" style="padding:10px;">
            <h4 style="margin-top:0; border-bottom:1px solid #cbd5e1; padding-bottom:6px;">🗃️ Record Attuali nel Database (<span id="db-count">0</span>)</h4>
            <div style="overflow-x:auto;">
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Item (Chiave)</th>
                            <th>Ideale</th>
                            <th class="text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="db-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Database logico centrale (Array di Oggetti strutturati)
        let database = [];

        function switchTab(tab) {
            if (tab === 'orders') {
                document.getElementById('tab-orders').classList.remove('hidden');
                document.getElementById('tab-manage').classList.add('hidden');
                document.getElementById('btn-tab-orders').classList.remove('btn-secondary');
                document.getElementById('btn-tab-manage').classList.add('btn-secondary');
                renderOrdersCards();
            } else {
                document.getElementById('tab-orders').classList.add('hidden');
                document.getElementById('tab-manage').classList.remove('hidden');
                document.getElementById('btn-tab-orders').classList.add('btn-secondary');
                document.getElementById('btn-tab-manage').classList.remove('btn-secondary');
                renderDatabaseTable();
            }
        }

        // --- FUNZIONI DATABASE ARCHIVIO ---
        
        function renderDatabaseTable() {
            const tbody = document.getElementById('db-table-body');
            document.getElementById('db-count').innerText = database.length;
            tbody.innerHTML = '';

            if(database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#64748b; padding:15px;">Database vuoto. Inserisci il primo record qui sopra!</td></tr>`;
                return;
            }

            database.forEach((record, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${record.name}</strong></td>
                    <td>${record.ideal}</td>
                    <td class="text-center" style="white-space:nowrap;">
                        <button class="btn-edit" onclick="editRecord(${index})">✏️ Modifica</button>
                        <button class="btn-danger" onclick="deleteRecord(${index})">🗑️ Elimina</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function saveRecord() {
            const nameField = document.getElementById('field-name').value.trim();
            const idealField = parseInt(document.getElementById('field-ideal').value) || 0;
            const editIndex = document.getElementById('edit-index').value;

            if(nameField === "" || idealField <= 0) {
                alert("Errore: Compila tutti i campi del record correttamente!");
                return;
            }

            if(editIndex === "") {
                // Controllo duplicati in inserimento nuovo record
                const exists = database.some(r => r.name.toLowerCase() === nameField.toLowerCase());
                if(exists) {
                    alert("Questo item esiste già nel database! Usa la funzione modifica se vuoi cambiare i parametri.");
                    return;
                }
                // CREA NUOVO RECORD
                database.push({
                    name: nameField,
                    ideal: idealField,
                    inCasa: 0,
                    arrivi: 0,
                    confermato: null
                });
            } else {
                // AGGIORNA RECORD ESISTENTE
                const idx = parseInt(editIndex);
                database[idx].name = nameField;
                database[idx].ideal = idealField;
                // Se
