<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RH_ULI Stock System PRO</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; box-sizing: border-box; }
        
        /* Barra di Navigazione */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 12px; position: sticky; top: 0; background: var(--bg); padding: 4px 0; z-index: 100; }
        .nav-btn { flex: 1; background: #475569; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--primary); }
        
        /* Pulsanti */
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 100%; display: block; text-align: center; box-sizing: border-box; margin-bottom: 8px; cursor: pointer; }
        .btn-success { background: #16a34a; }
        .btn-danger { background: #dc2626; padding: 6px 10px; font-size: 12px; width: auto; display: inline-block; }
        .btn-edit { background: #ea580c; padding: 6px 10px; font-size: 12px; width: auto; display: inline-block; }
        
        /* Ricerca */
        .search-input { width: 100%; padding: 14px; border: 2px solid var(--primary); border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; background: white; }
        
        /* Scheda Prodotto */
        .item-card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .item-header { font-size: 16px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #dbeafe; padding-bottom: 6px; margin-bottom: 12px; }
        
        /* Griglie Parametri */
        .section-title { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; margin: 10px 0 4px 0; letter-spacing: 0.5px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        
        .data-box { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; text-align: center; }
        .data-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        .data-val { font-size: 14px; font-weight: bold; color: #0f172a; }
        .data-box.highlight { background: #eff6ff; border-color: #bfdbfe; }
        .data-box.alert { background: #fffbeb; border-color: #fde68a; }
        .data-box.output { background: #f0fdf4; border-color: #bbf7d0; }
        
        /* Campi di Input */
        .input-box { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; text-align: center; font-weight: bold; background: #fff; }
        .input-confirm { border: 2px solid #16a34a; background: #f0fdf4; color: #16a34a; }
        
        /* Form Database Archivio */
        .db-form { background: white; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        /* Tabella Anagrafica */
        .db-table-wrapper { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #cbd5e1; }
        .db-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .db-table th, .db-table td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .db-table th { background: #e2e8f0; font-weight: bold; }
        
        .page-panel { display: block; }
        .page-panel.hidden { display: none !important; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="nav-orders" class="nav-btn active" onclick="switchTab('orders')">📋 Compila Ordini</button>
        <button id="nav-manage" class="nav-btn" onclick="switchTab('manage')">🗄️ Database Archivio</button>
    </div>

    <div id="panel-orders" class="page-panel">
        <input type="text" id="search-input" class="search-input" onkeyup="renderOrders()" placeholder="🔍 Cerca per Codice o Descrizione...">
        <div id="cards-container"></div>
        <button class="btn btn-success" style="margin-top: 15px;" onclick="sendOrderWhatsApp()">📱 Esporta Ordine Completo su WhatsApp</button>
    </div>

    <div id="panel-manage" class="page-panel hidden">
        <div class="db-form">
            <h3 id="form-title" style="margin-top:0; color:#1e3a8a;">➕ Inserisci Nuovo Item</h3>
            <input type="hidden" id="edit-index" value="">
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Codice Item (Numerico)</label>
                    <input type="text" id="f-code" class="form-input" placeholder="Es. 101">
                </div>
                <div class="form-group">
                    <label>Descrizione / Nome</label>
                    <input type="text" id="f-name" class="form-input" placeholder="Es. Pane Bianco">
                </div>
            </div>
            
            <div class="grid-3">
                <div class="form-group">
                    <label>Peso (Grammi)</label>
                    <input type="number" id="f-weight" class="form-input" placeholder="Es. 500">
                </div>
                <div class="form-group">
                    <label>Pz x Conf</label>
                    <input type="number" id="f-pcs-conf" class="form-input" placeholder="Es. 10">
                </div>
                <div class="form-group">
                    <label>Conf x Cartone</label>
                    <input type="number" id="f-conf-cart" class="form-input" placeholder="Es. 4">
                </div>
            </div>
            
            <div style="display:flex; gap:10px;">
                <button class="btn" style="margin-bottom:0;" onclick="saveDatabaseRecord()">💾 Salva nel Database</button>
                <button class="nav-btn" id="btn-db-cancel" style="display:none;" onclick="resetForm()">Annulla</button>
            </div>
        </div>

        <div class="item-card">
            <h4 style="margin-top:0; margin-bottom:10px;">🗃️ Elenco Prodotti Salvati (<span id="db-count">0</span>)</h4>
            <div class="db-table-wrapper">
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Codice</th>
                            <th>Descrizione</th>
                            <th>Misure</th>
                            <th class="text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="db-table-body"></tbody>
                </table>
            </div>
        </div>
        
        <button class="btn" style="background:#64748b; margin-top:20px; font-size:12px; padding:8px;" onclick="emergencyReset()">🔄 Reset di Emergenza Memoria App</button>
    </div>

    <script>
        let database = [];

        function switchTab(tab) {
            if (tab === 'orders') {
                document.getElementById('panel-orders').classList.remove('hidden');
                document.getElementById('panel-manage').classList.add('hidden');
                document.getElementById('nav-orders').classList.add('active');
                document.getElementById('nav-manage').classList.remove('active');
                renderOrders();
            } else {
                document.getElementById('panel-orders').classList.add('hidden');
                document.getElementById('panel-manage').classList.remove('hidden');
                document.getElementById('nav-orders').classList.remove('active');
                document.getElementById('nav-manage').classList.add('active');
                renderDatabaseTable();
            }
        }

        function renderDatabaseTable() {
            const tbody = document.getElementById('db-table-body');
            document.getElementById('db-count').innerText = database.length;
            tbody.innerHTML = '';

            if(database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:15px; color:#64748b;">Nessun record in archivio. Inseriscilo sopra.</td></tr>`;
                return;
            }

            database.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.code}</strong></td>
                    <td>${item.name}</td>
                    <td>${item.weight}g | C:${item.confCart}xP:${item.pcsConf}</td>
                    <td class="text-center">
                        <button class="btn-edit" onclick="editDatabaseRecord(${index})">✏️</button>
                        <button class="btn-danger" onclick="deleteDatabaseRecord(${index})">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function saveDatabaseRecord() {
            const code = document.getElementById('f-code').value.trim();
            const name = document.getElementById('f-name').value.trim();
            const weight = parseInt(document.getElementById('f-weight').value) || 0;
            const pcsConf = parseInt(document.getElementById('f-pcs-conf').value) || 0;
            const confCart = parseInt(document.getElementById('f-conf-cart').value) || 0;
            const editIndex = document.getElementById('edit-index').value;

            if(!code || !name || weight <= 0 || pcsConf <= 0 || confCart <= 0) {
                alert("Compila tutti i campi numerici!");
                return;
            }

            if(editIndex === "") {
                database.push({
                    code, name, weight, pcsConf, confCart,
                    giacMagazzino: 0, giacCucina: 0, arriviCartoni: 0, venditeSettimana: 0, confermatoCartoni: 0
                });
            } else {
                const idx = parseInt(editIndex);
                database[idx].code = code;
                database[idx].name = name;
                database[idx].weight = weight;
                database[idx].pcsConf = pcsConf;
                database[idx].confCart = confCart;
            }

            localStorage.setItem('rh_db_v8', JSON.stringify(database));
            resetForm();
            renderDatabaseTable();
            alert("Salvataggio completato!");
        }

        function editDatabaseRecord(index) {
            const item = database[index];
            document.getElementById('f-code').value = item.code;
            document.getElementById('f-name').value = item.name;
            document.getElementById('f-weight').value = item.weight;
            document.getElementById('f-pcs-conf').value = item.pcsConf;
            document.getElementById('f-conf-cart').value = item.confCart;
            document.getElementById('edit-index').value = index;
            document.getElementById('form-title').innerText = "✏️ Modifica Record";
            document.getElementById('btn-db-cancel').style.display = "inline-block";
        }

        function deleteDatabaseRecord(index) {
            if(confirm("Eliminare questo prodotto?")) {
                database.splice(index, 1);
                localStorage.setItem('rh_db_v8', JSON.stringify(database));
                renderDatabaseTable();
            }
        }

        function resetForm() {
            document.getElementById('f-code').value = "";
            document.getElementById('f-name').value = "";
            document.getElementById('f-weight').value = "";
            document.getElementById('f-pcs-conf').value = "";
            document.getElementById('f-conf-cart').value = "";
            document.getElementById('edit-index').value = "";
            document.getElementById('form-title').innerText = "➕ Inserisci Nuovo Item";
            document.getElementById('btn-db-cancel').style.display = "none";
        }

        function renderOrders() {
            const container = document.getElementById('cards-container');
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = '';

            if (query === '') {
                container.innerHTML = `<div class="data-box" style="padding:25px; color:#64748b; font-weight:bold;">🔍 Digita un Codice o una Descrizione per iniziare a compilare...</div>`;
                return;
            }

            const filtered = database.filter(item => 
                item.name.toLowerCase().includes(query) || item.code.toLowerCase().includes(query)
            );

            if(filtered.length === 0) {
                container.innerHTML = `<div class="data-box" style="padding:20px; color:#64748b;">Nessun prodotto trovato. Crea le tue anagrafiche nel pannello "Database Archivio".</div>`;
                return;
            }

            filtered.forEach(item => {
                const pezziPerCartone = item.pcsConf * item.confCart;
                const totaleInCasaPezzi = item.giacMagazzino + item.giacCucina;
                const arriviConfezioniTotali = item.arriviCartoni * item.confCart;
                const arriviPezziTotali = item.arriviCartoni * pezziPerCartone;
                
                const propostaPezzi = Math.max(0, item.venditeSettimana - totaleInCasaPezzi - arriviPezziTotali);
                const propostaCartoni = pezziPerCartone > 0 ? (propostaPezzi / pezziPerCartone).toFixed(2) : 0;
                
                const pezziOrdinatiFinali = item.confermatoCartoni * pezziPerCartone;
                const kgOrdinatiFinali = ((pezziOrdinatiFinali * item.weight) / 1000).toFixed(2);

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-header">📦 [COD. ${item.code}] - ${item.name}</div>
                    
                    <div class="grid-3">
                        <div class="data-box"><div class="data-label">Peso</div><div class="data-val">${item.weight}g</div></div>
                        <div class="data-box"><div class="data-label">Pz x Conf</div><div class="data-val">${item.pcsConf}</div></div>
                        <div class="data-box"><div class="data-label">Conf x Crt</div><div class="data-val">${item.confCart}</div></div>
                    </div>

                    <div class="section-title">1. Giacenza In Casa (Pezzi)</div>
                    <div class="grid-3">
                        <div>
                            <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">MAGAZZINO</label>
                            <input type="number" class="input-box" value="${item.giacMagazzino}" 
                                onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';"
                                onchange="updateValue('${item.code}', 'giacMagazzino', this.value)">
                        </div>
                        <div>
                            <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">CUCINA</label>
                            <input type="number" class="input-box" value="${item.giacCucina}" 
                                onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';"
                                onchange="updateValue('${item.code}', 'giacCucina', this.value)">
                        </div>
                        <div class="data-box highlight">
                            <div class="data-label">Totale Casa (X)</div>
                            <div class="data-val">${totaleInCasaPezzi} pz</div>
                        </div>
                    </div>

                    <div class="section-title">2. In Arrivo & Vendite Recenti</div>
                    <div class="grid-3">
                        <div>
                            <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">ARRIVI (CRT)</label>
                            <input type="number" class="input-box" value="${item.arriviCartoni}" 
                                onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';"
                                onchange="updateValue('${item.code}', 'arriviCartoni', this.value)">
                        </div>
                        <div class="data-box">
                            <div class="data-label">In Arrivo (Z)</div>
                            <div class="data-val" style="font-size:11px;">${arriviConfezioniTotali} conf<br>${arriviPezziTotali} pz</div>
                        </div>
                        <div>
                            <label style="font-size:9px; font-weight:bold; display:block; text-align:center;">VENDITE (PZ) (Y)</label>
                            <input type="number" class="input-box" value="${item.venditeSettimana}" 
                                onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';"
                                onchange="updateValue('${item.code}', 'venditeSettimana', this.value)">
                        </div>
                    </div>

                    <div class="section-title">3. Analisi e Proposta di Ordine</div>
                    <div class="grid-2">
                        <div class="data-box alert"><div class="data-label">Proposta (Pezzi)</div><div class="data-val">${propostaPezzi} pz</div></div>
                        <div class="data-box alert"><div class="data-label">Proposta (Cartoni)</div><div class="data-val">${propostaCartoni} CRT</div></div>
                    </div>

                    <div class="section-title" style="color:#16a34a;">4. Conferma Quantità d'Ordine</div>
                    <div class="grid-3">
                        <div>
                            <label style="font-size:9px; font-weight:bold; display:block; text-align:center; color:#16a34a;">CONF. CRT</label>
                            <input type="number" class="input-box input-confirm" value="${item.confermatoCartoni}" 
                                onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';"
                                onchange="updateValue('${item.code}', 'confermatoCartoni', this.value)">
                        </div>
                        <div class="data-box output"><div class="data-label">Tot Pezzi</div><div class="data-val" style="color:#16a34a;">${pezziOrdinatiFinali}</div></div>
                        <div class="data-box output"><div class="data-label">Tot Kg</div><div class="data-val" style="color:#16a34a;">${kgOrdinatiFinali}</div></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateValue(code, field, value) {
            const item = database.find(i => i.code === code);
            if(item) {
                item[field] = field.includes('Cartoni') ? (parseFloat(value) || 0) : (parseInt(value) || 0);
                localStorage.setItem('rh_db_v8', JSON.stringify(database));
                renderOrders();
            }
        }

        // FORMATTAZIONE AVANZATA PER TRASMETTERE L'INTERA VIDEATA DEI PARAMETRI
        function sendOrderWhatsApp() {
            const toOrder = database.filter(i => i.confermatoCartoni > 0);
            if(toOrder.length === 0) {
                alert("Nessun ordine confermato presente!");
                return;
            }
            
            let text = "📋 *REPORT REQUISIZIONE COMPLETO STOCK RH_ULI*\n";
            text += "===================================\n\n";
            
            let pesoTotaleSpedizione = 0;
            
            toOrder.forEach(i => {
                const pezziPerCartone = i.pcsConf * i.confCart;
                const totaleInCasaPezzi = i.giacMagazzino + i.giacCucina;
                const arriviPezziTotali = i.arriviCartoni * pezziPerCartone;
                
                const propostaPezzi = Math.max(0, i.venditeSettimana - totaleInCasaPezzi - arriviPezziTotali);
                const propostaCartoni = pezziPerCartone > 0 ? (propostaPezzi / pezziPerCartone).toFixed(2) : 0;
                
                const pezziOrdinatiFinali = i.confermatoCartoni * pezziPerCartone;
                const kgTot = (pezziOrdinatiFinali * i.weight) / 1000;
                pesoTotaleSpedizione += kgTot;
                
                // Ricostruzione testuale identica alla videata dell'app
                text += `📦 *[COD.${i.code}] ${i.name}*\n`;
                text += `┌─ 📋 *ANAGRAFICA:* ${i.weight}g | ${i.pcsConf} pz/conf | ${i.confCart} conf/crt\n`;
                text += `├─ 🏠 *1. IN CASA:* Mag: ${i.giacMagazzino} pz | Cuc: ${i.giacCucina} pz ➔ *Tot: ${totaleInCasaPezzi} pz*\n`;
                text += `├─ 🚚 *2. ARRIVI & VENDITE:* Arrivi: ${i.arriviCartoni} CRT (${arriviPezziTotali} pz) | Vendite: ${i.venditeSettimana} pz\n`;
                text += `├─ 📊 *3. ANALISI PROPOSTA:* ${propostaPezzi} pz ➔ *${propostaCartoni} CRT*\n`;
                text += `└─ ✅ *4. CONFERMA ORDINE:* *${i.confermatoCartoni} CRT* (*${pezziOrdinatiFinali} pz* | *${kgTot.toFixed(2)} Kg*)\n`;
                text += "-----------------------------------\n\n";
            });
            
            text += `⚖️ *BILANCIO PESO TOTALE SPEDIZIONE:* *${pesoTotaleSpedizione.toFixed(2)} Kg*`;
            
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(text), '_blank');
        }

        function emergencyReset() {
            if(confirm("Attenzione: questo cancellerà la vecchia memoria e riavvierà i pulsanti. Continuare?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = function() {
            const saved = localStorage.getItem('rh_db_v8');
            if(saved) {
                database = JSON.parse(saved);
            } else {
                database = [
                    { code: "1001", name: "ESEMPIO PRODOTTO TEST", weight: 500, pcsConf: 10, confCart: 4, giacMagazzino: 0, giacCucina: 0, arriviCartoni: 0, venditeSettimana: 0, confermatoCartoni: 0 }
                ];
                localStorage.setItem('rh_db_v8', JSON.stringify(database));
            }
            renderOrders();
        };
    </script>
</body>
</html>
